<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Friends</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="popup-container">
        <div class="header-tabs">
            <button id="tab-dashboard" class="header-tab tab-active">
                Dashboard
            </button>
            <button id="tab-settings" class="header-tab">
                Settings
            </button>
        </div>

        <div id="dashboard-content">
            <div id="servers-status-container">
                <p class="message">No servers configured</p>
            </div>
        </div>

        <div id="settings-content" class="hidden">
            <div class="server-config">
                <h3 class="header-section">Servers</h3>
                
                <div id="servers-list">
                    <p class="message">No servers configured</p>
                </div>

                <!-- Add Server Form -->
                <div class="add-form">
                    <input type="text" id="server-ip-input" placeholder="Server IP"/>
                    <input type="text" id="server-name-input" placeholder="Server Name"/>
                    <button id="add-server-btn" class="btn">
                        Add Server
                    </button>
                </div>
            </div>

            <div class="friends-config">
                <h3 class="header-section">Favorite Friends</h3>
                
                <div id="friends-list">
                    <p class="message">No friends added</p>
                </div>

                <div class="add-form">
                    <input type="text" id="friend-name" placeholder="Friend Name"/>
                    <button id="add-friend-btn" class="btn">
                        Add Friend
                    </button>
                </div>

                <label class="checkbox-container">
                    <input type="checkbox" id="all-friends-toggle" class="w-4 h-4" />
                    <span class="checkbox-label">Notify for all players joining</span>
                </label>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
