<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Friends</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white">
    <div class="popup-container">
        <!-- Header Tabs -->
        <div class="flex border-b border-gray-700">
            <button id="tab-dashboard" class="flex-1 py-3 px-4 text-center border-b-2 border-blue-500 font-semibold">
                Dashboard
            </button>
            <button id="tab-settings" class="flex-1 py-3 px-4 text-center border-b-2 border-transparent hover:border-gray-400 cursor-pointer">
                Settings
            </button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboard-content" class="flex-1 overflow-y-auto p-4">
            <!-- Server Status -->
            <div id="server-status" class="mb-4">
                <div class="flex justify-between items-center mb-3">
                    <h2 id="server-name" class="text-lg font-bold">No Server Selected</h2>
                    <span id="online-count" class="bg-green-600 text-white px-3 py-1 rounded-full text-sm" style="display: none;">
                        <span id="player-count">0</span> Online
                    </span>
                    <span id="offline-status" class="bg-red-600 text-white px-3 py-1 rounded-full text-sm">
                        Offline
                    </span>
                </div>

                <!-- Players List -->
                <div id="players-list" class="space-y-2">
                    <p class="text-gray-400 text-sm">No server selected or server is offline</p>
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings-content" class="hidden flex-1 overflow-y-auto p-4">
            <!-- Server Configuration -->
            <div class="mb-6">
                <h3 class="text-md font-bold mb-3">Servers</h3>
                
                <div id="servers-list" class="space-y-2 mb-3">
                    <p class="text-gray-400 text-sm">No servers configured</p>
                </div>

                <!-- Add Server Form -->
                <div class="bg-gray-800 p-3 rounded mb-3 border border-gray-700">
                    <input type="text" id="server-ip-input" placeholder="Server IP" class="w-full bg-gray-700 text-white px-3 py-2 rounded mb-2 text-sm" />
                    <input type="text" id="server-name-input" placeholder="Server Name" class="w-full bg-gray-700 text-white px-3 py-2 rounded mb-2 text-sm" />
                    <button id="add-server-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded text-sm font-semibold">
                        Add Server
                    </button>
                </div>
            </div>

            <!-- Friends Configuration -->
            <div class="mb-6">
                <h3 class="text-md font-bold mb-3">Favorite Friends</h3>
                
                <div id="friends-list" class="space-y-2 mb-3">
                    <p class="text-gray-400 text-sm">No friends added</p>
                </div>

                <!-- Add Friend Form -->
                <div class="bg-gray-800 p-3 rounded mb-3 border border-gray-700">
                    <input type="text" id="friend-name" placeholder="Friend Name" class="w-full bg-gray-700 text-white px-3 py-2 rounded mb-2 text-sm" />
                    <button id="add-friend-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded text-sm font-semibold">
                        Add Friend
                    </button>
                </div>

                <!-- All Friends Toggle -->
                <label class="flex items-center bg-gray-800 p-3 rounded border border-gray-700 cursor-pointer">
                    <input type="checkbox" id="all-friends-toggle" class="w-4 h-4" />
                    <span class="ml-2 text-sm">Notify for all players joining</span>
                </label>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
